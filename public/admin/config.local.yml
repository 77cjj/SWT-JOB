# 本地开发时使用 - 直接编辑本地文件
# local_backend: true 会覆盖 backend 配置，直接读写本地文件
backend:
  name: git-gateway
  branch: master

local_backend: true

media_folder: "public/images"
public_folder: "/images"

# A list of collections the CMS should be able to edit
collections:
  - name: "intro"
    label: "项目介绍 (Intro)"
    folder: "src/pages/docs/intro"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "preparation"
    label: "行前准备 (Preparation)"
    folder: "src/pages/docs/preparation"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "experience"
    label: "行中指南 (Experience)"
    folder: "src/pages/docs/experience"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "after"
    label: "行后与归国 (After)"
    folder: "src/pages/docs/after"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "basics"
    label: "基础指南 (Basics)"
    folder: "src/pages/docs/basics"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "index"
    label: "首页文档"
    files:
      - label: "文档首页"
        name: "index"
        file: "src/pages/docs/index.mdx"
        fields:
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "meta"
    label: "菜单配置 (_meta.json)"
    files:
      - name: "intro_meta"
        label: "介绍菜单"
        file: "src/pages/docs/intro/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "preparation_meta"
        label: "行前菜单"
        file: "src/pages/docs/preparation/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "experience_meta"
        label: "行中菜单"
        file: "src/pages/docs/experience/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "after_meta"
        label: "行后菜单"
        file: "src/pages/docs/after/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "main_meta"
        label: "主菜单"
        file: "src/pages/docs/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}

