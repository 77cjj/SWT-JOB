<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>SWT Helper - 内容管理</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!-- Decap CMS 挂载点 -->
    <div id="nc-root"></div>

    <!-- 监听 OAuth 回调消息，收到后刷新页面，便于 Decap 读取 token -->
    <script>
      (function () {
        // 将本地 fallback token 转成 Decap 认可的 localStorage 结构（含 user 信息）
        function hydrateDecapUserFromFallback() {
          const token = localStorage.getItem('cms_token');
          if (!token) return false;
          const user = {
            login: true,
            token,
            provider: 'github',
            backendName: 'github',
            user: {
              login: 'fallback',
              name: 'GitHub User',
              avatar_url: '',
              html_url: 'https://github.com',
            },
          };
          localStorage.setItem('netlify-cms-user', JSON.stringify(user));
          return true;
        }

        const hydrated = hydrateDecapUserFromFallback();
        // 如果已写入登录态且当前在登录路由，刷新以触发 Decap 读取登录态
        if (hydrated && window.location.hash.startsWith('#/login')) {
          setTimeout(() => window.location.reload(), 150);
        }

        function handleAuthMessage(event) {
          const msg = event.data;
          if (typeof msg !== 'string') return;
          if (!msg.startsWith('authorization:github:success:')) return;
          try {
            const payload = msg.replace('authorization:github:success:', '');
            const data = JSON.parse(payload);
            if (data?.token) {
              // 备用存储，避免父窗口错过 popup 写入
              localStorage.setItem('cms_token', data.token);
              localStorage.setItem('cms_token_timestamp', Date.now().toString());
              const user = {
                login: true,
                token: data.token,
                provider: 'github',
                backendName: 'github',
                user: {
                  login: 'fallback',
                  name: 'GitHub User',
                  avatar_url: '',
                  html_url: 'https://github.com',
                },
              };
              localStorage.setItem('netlify-cms-user', JSON.stringify(user));
            }
          } catch (e) {
            console.warn('[CMS] 解析授权消息失败:', e);
          }
          // 收到成功消息后刷新，让 Decap 重新初始化并读取 token
          setTimeout(() => {
            window.location.reload();
          }, 300);
        }
        window.addEventListener('message', handleAuthMessage);
      })();
    </script>

    <!-- Decap CMS 脚本（自行初始化，不再手动调用 CMS.init） -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
