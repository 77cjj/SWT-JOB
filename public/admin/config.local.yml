# 本地开发时使用 - 使用 GitHub OAuth（与生产环境相同）
# 注意：需要配置 GitHub OAuth 环境变量
backend:
  name: github
  repo: 77cjj/SWT-JOB
  branch: master
  base_url: http://localhost:3000
  auth_endpoint: api/auth
  auth_scope: repo
  commit_messages:
    create: '创建 {{collection}} "{{slug}}"'
    update: '更新 {{collection}} "{{slug}}"'
    delete: '删除 {{collection}} "{{slug}}"'
    uploadMedia: '上传 "{{path}}"'
    deleteMedia: '删除 "{{path}}"'

# 不使用 local_backend，避免需要运行代理服务器
# local_backend: false

media_folder: "public/images"
public_folder: "/images"

# A list of collections the CMS should be able to edit
collections:
  - name: "intro"
    label: "项目介绍 (Intro)"
    folder: "src/pages/docs/intro"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "preparation"
    label: "行前准备 (Preparation)"
    folder: "src/pages/docs/preparation"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "experience"
    label: "行中指南 (Experience)"
    folder: "src/pages/docs/experience"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "after"
    label: "行后与归国 (After)"
    folder: "src/pages/docs/after"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "basics"
    label: "基础指南 (Basics)"
    folder: "src/pages/docs/basics"
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: yaml-frontmatter
    frontmatter_delimiter: "---"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "index"
    label: "首页文档"
    files:
      - label: "文档首页"
        name: "index"
        file: "src/pages/docs/index.mdx"
        fields:
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "meta"
    label: "菜单配置 (_meta.json)"
    files:
      - name: "intro_meta"
        label: "介绍菜单"
        file: "src/pages/docs/intro/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "preparation_meta"
        label: "行前菜单"
        file: "src/pages/docs/preparation/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "experience_meta"
        label: "行中菜单"
        file: "src/pages/docs/experience/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "after_meta"
        label: "行后菜单"
        file: "src/pages/docs/after/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}
      - name: "main_meta"
        label: "主菜单"
        file: "src/pages/docs/_meta.json"
        fields:
          - {label: "Menu Items (JSON)", name: "body", widget: "code", default_language: "json"}

