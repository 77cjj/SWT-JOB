backend:
  name: github
  repo: 77cjj/SWT-JOB
  branch: main
  base_url: https://你的Vercel域名.vercel.app # 替换为你的真实域名
  auth_endpoint: api/auth # 对应 src/pages/api/auth.ts

media_folder: "public/images"
public_folder: "/images"

# A list of collections the CMS should be able to edit
collections:
  - name: "intro"
    label: "介绍 (Intro)"
    folder: "src/pages/docs/intro"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "preparation"
    label: "行前准备 (Preparation)"
    folder: "src/pages/docs/preparation"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "experience"
    label: "行中指南 (Experience)"
    folder: "src/pages/docs/experience"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "after"
    label: "行后与归国 (After)"
    folder: "src/pages/docs/after"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "meta"
    label: "菜单配置 (_meta.json)"
    files:
      - name: "intro_meta"
        label: "介绍菜单"
        file: "src/pages/docs/intro/_meta.json"
        fields:
          - {label: "Menu Items", name: "items", widget: "code", output_code_only: true, default_language: "json"}
      - name: "preparation_meta"
        label: "行前菜单"
        file: "src/pages/docs/preparation/_meta.json"
        fields:
          - {label: "Menu Items", name: "items", widget: "code", output_code_only: true, default_language: "json"}
      - name: "experience_meta"
        label: "行中菜单"
        file: "src/pages/docs/experience/_meta.json"
        fields:
          - {label: "Menu Items", name: "items", widget: "code", output_code_only: true, default_language: "json"}
      - name: "after_meta"
        label: "行后菜单"
        file: "src/pages/docs/after/_meta.json"
        fields:
          - {label: "Menu Items", name: "items", widget: "code", output_code_only: true, default_language: "json"}

