# SWT-JOB 服务器基础设施（PostgreSQL + Redis + RocketMQ + RustFS）
# 向量检索使用 pgvector，无需 Milvus

name: swt-server

services:
  postgres:
    container_name: swt-server-pg
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragent
    volumes:
      - swt-server-pg-data:/var/lib/postgresql/data
      - ../SWT-JOB-Backend/resources/database/schema_pg.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragent"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    container_name: swt-server-redis
    image: redis:7
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  rustfs:
    container_name: swt-server-rustfs
    image: rustfs/rustfs:1.0.0-alpha.72
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - swt-server-rustfs-data:/data
    command:
      - "--address"
      - ":9000"
      - "--console-enable"
      - "--access-key"
      - "rustfsadmin"
      - "--secret-key"
      - "rustfsadmin"
      - "/data"
    restart: unless-stopped

  rmqnamesrv:
    container_name: swt-server-rmqnamesrv
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx400m"
    command: sh mqnamesrv
    networks:
      - rocketmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'The Name Server boot success' /home/rocketmq/logs/rocketmqlogs/namesrv.log || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  rmqbroker:
    container_name: swt-server-rmqbroker
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    ports:
      - "10912:10912"
      - "10911:10911"
      - "10909:10909"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    environment:
      NAMESRV_ADDR: "rmqnamesrv:9876"
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    depends_on:
      rmqnamesrv:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cat > /home/rocketmq/rocketmq-5.2.0/conf/broker.conf << EOF
        brokerClusterName = DefaultCluster
        brokerName = broker-a
        brokerId = 0
        deleteWhen = 04
        fileReservedTime = 48
        brokerRole = ASYNC_MASTER
        flushDiskType = ASYNC_FLUSH
        brokerIP1 = 127.0.0.1
        timerMaxDelaySec = 31622400
        EOF
        sh mqbroker --enable-proxy \
          -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf
    networks:
      - rocketmq
    restart: unless-stopped

networks:
  rocketmq:
    driver: bridge

volumes:
  swt-server-pg-data:
  swt-server-rustfs-data:
