name: Deploy Backend to Aliyun

on:
  push:
    branches:
      - master
    paths:
      - "SWT-JOB-Backend/**"
      - "server.sh"
      - "scripts/auto-pull-backend.sh"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-aliyun
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate secrets
        shell: bash
        env:
          ALIYUN_SSH_HOST: ${{ secrets.ALIYUN_SSH_HOST }}
          ALIYUN_SSH_USER: ${{ secrets.ALIYUN_SSH_USER }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          ALIYUN_DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          missing=0
          for name in ALIYUN_SSH_HOST ALIYUN_SSH_USER ALIYUN_SSH_KEY ALIYUN_DEPLOY_PATH; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing GitHub Secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare SSH private key
        shell: bash
        env:
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          KEY_FILE="${GITHUB_WORKSPACE}/aliyun_deploy_key"
          printf '%s\n' "${ALIYUN_SSH_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"

          if ! grep -q "BEGIN.*PRIVATE KEY" "${KEY_FILE}"; then
            echo "::error::ALIYUN_SSH_KEY 不是私钥。请粘贴含 BEGIN OPENSSH PRIVATE KEY 或 BEGIN RSA PRIVATE KEY 的完整私钥，不要粘贴 .pub 公钥。"
            exit 1
          fi

          if ! ssh-keygen -y -f "${KEY_FILE}" >/dev/null 2>&1; then
            echo "::error::ALIYUN_SSH_KEY 无法解析。常见原因：复制不完整、换行丢失、或粘贴了错误内容。请重新生成并完整粘贴私钥。"
            exit 1
          fi

          echo "SSH private key looks valid."

      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_SSH_HOST }}
          username: ${{ secrets.ALIYUN_SSH_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.ALIYUN_DEPLOY_PATH }}"
            BRANCH="master"

            cd "${DEPLOY_PATH}"

            if [[ ! -x "./server.sh" ]]; then
              echo "server.sh not found in ${DEPLOY_PATH}"
              exit 1
            fi

            echo "==> Sync code (${BRANCH})"
            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"

            echo "==> Build and restart backend"
            ./server.sh restart backend --pull --skip-update-check --force

            echo "==> Done"
