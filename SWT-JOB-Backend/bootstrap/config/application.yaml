# 由 server.sh 自动写入（每次启动都会覆盖）
# 目的：2G 小内存机器上避免 MCP / RocketMQ 消费者阻塞 Spring 启动，导致 Nginx 502

rag:
  mcp:
    servers: []

rocketmq:
  consumer:
    listeners:
      knowledge-document-chunk_cg:
        knowledge-document-chunk_topic: false
      message-feedback_cg:
        message-feedback_topic: false

logging:
  level:
    org.apache.rocketmq: WARN
